<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520">
  <defs>
    <linearGradient id="bg-beb" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#fdf6e8"/>
      <stop offset="1" stop-color="#fdf0ee"/>
    </linearGradient>
  </defs>
  <rect width="800" height="520" fill="url(#bg-beb)"/>
  <!-- soft decorative circles -->
  <circle cx="150" cy="100" r="60" fill="#E8C94A" opacity="0.08"/>
  <circle cx="650" cy="400" r="80" fill="#E87461" opacity="0.06"/>
  <circle cx="400" cy="80" r="50" fill="#4A7C59" opacity="0.06"/>
  <!-- colorful plate/tray -->
  <ellipse cx="400" cy="300" rx="250" ry="140" fill="#D4A54A" opacity="0.15"/>
  <ellipse cx="400" cy="300" rx="230" ry="125" fill="#fdf5e6"/>
  <ellipse cx="400" cy="300" rx="230" ry="125" fill="none" stroke="#D4A54A" stroke-width="2"/>
  <!-- banana slices -->
  <g transform="translate(280 260)">
    <path d="M0 0 Q15 -15 30 0 Q15 10 0 0Z" fill="#E8C94A"/>
    <path d="M10 15 Q25 0 40 15 Q25 25 10 15Z" fill="#E8C94A"/>
    <path d="M-5 30 Q10 15 25 30 Q10 40 -5 30Z" fill="#E8C94A"/>
  </g>
  <!-- avocado halves -->
  <g transform="translate(340 330)">
    <ellipse cx="0" cy="0" rx="30" ry="22" fill="#7CB98A"/>
    <ellipse cx="0" cy="0" rx="20" ry="14" fill="#b8d4a0"/>
    <circle cx="0" cy="0" r="10" fill="#8B5E3C"/>
  </g>
  <!-- carrot sticks -->
  <g transform="translate(450 250)" fill="#f4903a">
    <rect x="0" y="0" width="8" height="50" rx="3" transform="rotate(-10)"/>
    <rect x="20" y="5" width="8" height="45" rx="3" transform="rotate(5)"/>
    <rect x="40" y="0" width="8" height="48" rx="3" transform="rotate(-5)"/>
  </g>
  <!-- broccoli -->
  <g transform="translate(500 320)">
    <rect x="-3" y="5" width="6" height="20" rx="2" fill="#4A7C59"/>
    <circle cx="0" cy="0" r="14" fill="#4A7C59"/>
    <circle cx="-10" cy="5" r="10" fill="#3d6a40"/>
    <circle cx="10" cy="5" r="10" fill="#3d6a40"/>
    <circle cx="-5" cy="-5" r="4" fill="#5a9a4a"/>
    <circle cx="5" cy="-3" r="3" fill="#5a9a4a"/>
  </g>
  <!-- baby hands reaching -->
  <g>
    <!-- left hand -->
    <path d="M100 350 Q120 320 140 310 Q145 308 148 312 L145 330 Q140 345 120 360Z" fill="#e0b090"/>
    <circle cx="148" cy="308" r="4" fill="#e0b090"/>
    <circle cx="152" cy="315" r="3" fill="#e0b090"/>
    <circle cx="150" cy="323" r="3" fill="#e0b090"/>
    <!-- right hand -->
    <path d="M680 340 Q660 310 640 305 Q635 303 632 307 L635 325 Q640 340 660 355Z" fill="#c8905d"/>
    <circle cx="632" cy="303" r="4" fill="#c8905d"/>
    <circle cx="628" cy="310" r="3" fill="#c8905d"/>
    <circle cx="630" cy="318" r="3" fill="#c8905d"/>
  </g>
  <!-- small stars/sparkles -->
  <g fill="#E8C94A" opacity="0.4">
    <path d="M300 150 L303 158 L310 160 L303 162 L300 170 L297 162 L290 160 L297 158Z"/>
    <path d="M550 180 L552 186 L558 188 L552 190 L550 196 L548 190 L542 188 L548 186Z"/>
    <path d="M200 400 L202 406 L208 408 L202 410 L200 416 L198 410 L192 408 L198 406Z"/>
  </g>
</svg>
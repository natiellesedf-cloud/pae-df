<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520">
  <defs>
    <linearGradient id="bg-ean" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#fdf6e8"/>
      <stop offset="1" stop-color="#f5f0e6"/>
    </linearGradient>
  </defs>
  <rect width="800" height="520" fill="url(#bg-ean)"/>
  <!-- traffic light post -->
  <rect x="380" y="60" width="40" height="400" rx="10" fill="#4a4a4a"/>
  <rect x="395" y="420" width="10" height="60" fill="#4a4a4a"/>
  <!-- GREEN section -->
  <g transform="translate(250 80)">
    <rect x="0" y="0" width="300" height="120" rx="12" fill="#4A7C59" opacity="0.15"/>
    <rect x="0" y="0" width="6" height="120" rx="3" fill="#4A7C59"/>
    <circle cx="40" cy="60" r="30" fill="#4A7C59"/>
    <text x="40" y="65" text-anchor="middle" font-family="Inter,sans-serif" font-size="28" fill="white" font-weight="700">V</text>
    <text x="90" y="40" font-family="Inter,sans-serif" font-size="13" font-weight="700" fill="#2d5a3a">IN NATURA E MINIMAMENTE PROCESSADOS</text>
    <text x="90" y="58" font-family="Inter,sans-serif" font-size="11" fill="#4A7C59">Base da alimentacao escolar (85%+)</text>
    <!-- food icons -->
    <circle cx="100" cy="85" r="10" fill="#e44" opacity="0.8"/>
    <circle cx="125" cy="85" r="8" fill="#f90" opacity="0.8"/>
    <ellipse cx="150" cy="85" rx="12" ry="8" fill="#4A7C59" opacity="0.6"/>
    <circle cx="178" cy="85" r="9" fill="#E8C94A" opacity="0.8"/>
    <ellipse cx="205" cy="85" rx="8" ry="11" fill="#D4A54A" opacity="0.7"/>
    <text x="100" y="110" font-family="Inter,sans-serif" font-size="9" fill="#4A7C59">Frutas  Legumes  Verduras  Ovos  Graos</text>
  </g>
  <!-- YELLOW section -->
  <g transform="translate(250 220)">
    <rect x="0" y="0" width="300" height="120" rx="12" fill="#D4A54A" opacity="0.15"/>
    <rect x="0" y="0" width="6" height="120" rx="3" fill="#D4A54A"/>
    <circle cx="40" cy="60" r="30" fill="#D4A54A"/>
    <text x="40" y="65" text-anchor="middle" font-family="Inter,sans-serif" font-size="28" fill="white" font-weight="700">A</text>
    <text x="90" y="40" font-family="Inter,sans-serif" font-size="13" font-weight="700" fill="#8B5E3C">PROCESSADOS - COM MODERACAO</text>
    <text x="90" y="58" font-family="Inter,sans-serif" font-size="11" fill="#D4A54A">Usar com parcimonia no cardapio</text>
    <rect x="100" y="75" width="14" height="18" rx="2" fill="#D4A54A" opacity="0.5"/>
    <circle cx="130" cy="84" r="10" fill="#f5f0e6" stroke="#D4A54A" stroke-width="1.5"/>
    <rect x="150" y="76" width="20" height="14" rx="3" fill="#D4A54A" opacity="0.4"/>
    <text x="100" y="110" font-family="Inter,sans-serif" font-size="9" fill="#8B5E3C">Conservas  Queijos  Paes artesanais</text>
  </g>
  <!-- RED section -->
  <g transform="translate(250 360)">
    <rect x="0" y="0" width="300" height="120" rx="12" fill="#E87461" opacity="0.15"/>
    <rect x="0" y="0" width="6" height="120" rx="3" fill="#E87461"/>
    <circle cx="40" cy="60" r="30" fill="#E87461"/>
    <text x="40" y="65" text-anchor="middle" font-family="Inter,sans-serif" font-size="28" fill="white" font-weight="700">X</text>
    <text x="90" y="40" font-family="Inter,sans-serif" font-size="13" font-weight="700" fill="#b8483a">ULTRAPROCESSADOS - EVITAR</text>
    <text x="90" y="58" font-family="Inter,sans-serif" font-size="11" fill="#E87461">Proibidos ou restritos no PNAE</text>
    <!-- crossed out junk food -->
    <g opacity="0.5">
      <rect x="100" y="75" width="14" height="20" rx="2" fill="#E87461"/>
      <line x1="98" y1="73" x2="116" y2="97" stroke="#b8483a" stroke-width="2"/>
      <circle cx="135" cy="85" r="10" fill="#E87461"/>
      <line x1="123" y1="73" x2="147" y2="97" stroke="#b8483a" stroke-width="2"/>
      <rect x="155" y="78" width="18" height="12" rx="3" fill="#E87461"/>
      <line x1="153" y1="73" x2="175" y2="97" stroke="#b8483a" stroke-width="2"/>
    </g>
    <text x="100" y="110" font-family="Inter,sans-serif" font-size="9" fill="#b8483a">Refrigerantes  Salgadinhos  Biscoitos recheados</text>
  </g>
</svg>
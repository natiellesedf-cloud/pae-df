<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520">
  <defs>
    <linearGradient id="bg-nutri" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#fdf6e8"/>
      <stop offset="1" stop-color="#faf0dc"/>
    </linearGradient>
    <linearGradient id="wall" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#f5f0e6"/>
      <stop offset="1" stop-color="#ece4d4"/>
    </linearGradient>
  </defs>
  <!-- background -->
  <rect width="800" height="520" fill="url(#bg-nutri)"/>
  <!-- wall -->
  <rect x="40" y="30" width="720" height="300" rx="12" fill="url(#wall)"/>

  <!-- blackboard - centered on wall -->
  <rect x="240" y="50" width="320" height="190" rx="10" fill="#2F3D1E"/>
  <rect x="250" y="60" width="300" height="170" rx="6" fill="#3d5a2e"/>
  <!-- board frame -->
  <rect x="240" y="50" width="320" height="190" rx="10" fill="none" stroke="#8B5E3C" stroke-width="4"/>
  <!-- board content -->
  <text x="400" y="95" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" fill="#eef7f0" font-weight="700">GRUPOS ALIMENTARES</text>
  <line x1="310" y1="105" x2="490" y2="105" stroke="#7CB98A" stroke-width="1" opacity="0.4"/>
  <!-- green group -->
  <circle cx="300" cy="130" r="10" fill="#4A7C59"/>
  <text x="316" y="134" font-family="Inter,sans-serif" font-size="11" fill="#b8d4a0">In natura - BASE</text>
  <!-- yellow group -->
  <circle cx="300" cy="158" r="10" fill="#D4A54A"/>
  <text x="316" y="162" font-family="Inter,sans-serif" font-size="11" fill="#E8C94A">Processados - pouco</text>
  <!-- red group -->
  <circle cx="300" cy="186" r="10" fill="#E87461"/>
  <text x="316" y="190" font-family="Inter,sans-serif" font-size="11" fill="#F5A08F">Ultra - EVITAR</text>
  <!-- check marks -->
  <path d="M475 126 L480 131 L490 121" stroke="#7CB98A" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M475 154 L480 159 L490 149" stroke="#E8C94A" stroke-width="2" fill="none" stroke-linecap="round"/>
  <line x1="475" y1="182" x2="490" y2="192" stroke="#F5A08F" stroke-width="2" stroke-linecap="round"/>
  <line x1="490" y1="182" x2="475" y2="192" stroke="#F5A08F" stroke-width="2" stroke-linecap="round"/>
  <!-- chalk drawings on board -->
  <circle cx="280" cy="210" r="6" fill="#7CB98A" opacity="0.4"/>
  <circle cx="296" cy="212" r="5" fill="#E8C94A" opacity="0.4"/>
  <circle cx="310" cy="208" r="4" fill="#F5A08F" opacity="0.3"/>

  <!-- window on left wall -->
  <rect x="70" y="70" width="120" height="140" rx="6" fill="#87CEEB" opacity="0.3"/>
  <rect x="70" y="70" width="120" height="140" rx="6" fill="none" stroke="#c8905d" stroke-width="3"/>
  <line x1="130" y1="70" x2="130" y2="210" stroke="#c8905d" stroke-width="2"/>
  <line x1="70" y1="140" x2="190" y2="140" stroke="#c8905d" stroke-width="2"/>
  <!-- sunlight -->
  <circle cx="150" cy="110" r="15" fill="#E8C94A" opacity="0.2"/>

  <!-- poster on right wall -->
  <rect x="600" y="80" width="130" height="100" rx="4" fill="white" stroke="#D4A54A" stroke-width="1.5"/>
  <text x="665" y="105" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#8B5E3C" font-weight="600">PRATO SAUDAVEL</text>
  <!-- mini plate -->
  <circle cx="665" cy="145" r="25" fill="#f5f0e6" stroke="#D4A54A" stroke-width="1"/>
  <path d="M665 120 L665 170" stroke="#D4A54A" stroke-width="0.5" opacity="0.5"/>
  <path d="M640 145 L690 145" stroke="#D4A54A" stroke-width="0.5" opacity="0.5"/>
  <path d="M665 145 L665 120 A25 25 0 0 1 690 145Z" fill="#4A7C59" opacity="0.5"/>
  <path d="M665 145 L690 145 A25 25 0 0 1 665 170Z" fill="#E8C94A" opacity="0.4"/>
  <path d="M665 145 L665 170 A25 25 0 0 1 640 145Z" fill="#8B5E3C" opacity="0.4"/>
  <path d="M665 145 L640 145 A25 25 0 0 1 665 120Z" fill="#E87461" opacity="0.3"/>

  <!-- kitchen counter -->
  <rect x="40" y="340" width="720" height="150" rx="6" fill="#c8905d"/>
  <rect x="40" y="330" width="720" height="16" rx="4" fill="#a07040"/>
  <!-- counter edge highlight -->
  <rect x="40" y="330" width="720" height="3" rx="1" fill="#d4a870" opacity="0.6"/>

  <!-- fruits and vegetables on counter -->
  <g>
    <!-- apple -->
    <circle cx="100" cy="318" r="14" fill="#e53935"/>
    <rect x="98" y="300" width="4" height="8" rx="1" fill="#5a3520"/>
    <ellipse cx="106" cy="306" rx="5" ry="3" fill="#4A7C59" transform="rotate(30 106 306)"/>
    <!-- orange -->
    <circle cx="140" cy="320" r="12" fill="#f57c00"/>
    <circle cx="140" cy="320" r="10" fill="#ff9800" opacity="0.6"/>
    <!-- banana -->
    <path d="M165 328 Q175 305 195 312 Q185 330 170 332Z" fill="#E8C94A"/>
    <!-- lettuce -->
    <g transform="translate(220 315)">
      <circle cx="0" cy="0" r="14" fill="#7CB98A"/>
      <circle cx="-8" cy="5" r="10" fill="#5a9a4a"/>
      <circle cx="8" cy="5" r="10" fill="#5a9a4a"/>
      <circle cx="0" cy="-2" r="6" fill="#b8d4a0"/>
    </g>
    <!-- carrot -->
    <path d="M270 330 L280 305 L290 330Z" fill="#f4903a" rx="3"/>
    <g stroke="#4A7C59" stroke-width="1.5" fill="none" stroke-linecap="round">
      <path d="M280 305 Q275 295 270 290"/>
      <path d="M280 305 Q285 295 290 292"/>
    </g>
  </g>

  <!-- cooking pots -->
  <g>
    <!-- big pot -->
    <rect x="560" y="365" width="60" height="50" rx="6" fill="#b0b0b0"/>
    <rect x="554" y="358" width="72" height="10" rx="4" fill="#999"/>
    <ellipse cx="590" cy="358" rx="8" ry="12" fill="#999"/>
    <!-- steam -->
    <path d="M575 350 Q572 340 578 335" stroke="#ddd" stroke-width="1.5" fill="none" opacity="0.4"/>
    <path d="M590 348 Q587 336 593 330" stroke="#ddd" stroke-width="1.5" fill="none" opacity="0.3"/>
    <path d="M605 350 Q602 338 608 333" stroke="#ddd" stroke-width="1.5" fill="none" opacity="0.4"/>
    <!-- small pot -->
    <rect x="650" y="380" width="45" height="35" rx="5" fill="#D4A54A"/>
    <rect x="645" y="374" width="55" height="8" rx="3" fill="#c09030"/>
  </g>

  <!-- nutritionist (centered, standing behind counter) -->
  <g transform="translate(420 310)">
    <!-- body -->
    <rect x="-22" y="-65" width="44" height="55" rx="6" fill="white"/>
    <!-- lab coat details -->
    <line x1="-8" y1="-65" x2="-8" y2="-20" stroke="#e0e0e0" stroke-width="0.5"/>
    <line x1="8" y1="-65" x2="8" y2="-20" stroke="#e0e0e0" stroke-width="0.5"/>
    <!-- green collar/tie -->
    <path d="M-8 -65 L0 -55 L8 -65" fill="#4A7C59"/>
    <!-- name badge -->
    <rect x="-16" y="-50" width="14" height="8" rx="2" fill="#4A7C59"/>
    <text x="-9" y="-44" text-anchor="middle" font-family="Inter,sans-serif" font-size="4" fill="white">CRN</text>
    <!-- head -->
    <circle cx="0" cy="-82" r="20" fill="#6d4a2a"/>
    <!-- hair -->
    <path d="M-20 -85 Q-20 -105 0 -105 Q20 -105 20 -85" fill="#3d2415"/>
    <!-- smile -->
    <path d="M-6 -76 Q0 -72 6 -76" stroke="#f5f0e6" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- eyes -->
    <circle cx="-7" cy="-84" r="2" fill="#f5f0e6"/>
    <circle cx="7" cy="-84" r="2" fill="#f5f0e6"/>
    <!-- pointing arm to board -->
    <path d="M22 -55 L60 -75 Q65 -78 62 -72 L24 -50Z" fill="#6d4a2a"/>
    <!-- other arm holding vegetable -->
    <path d="M-22 -50 L-45 -40 Q-48 -38 -44 -36 L-22 -44Z" fill="#6d4a2a"/>
    <circle cx="-48" cy="-38" r="7" fill="#f57c00"/>
  </g>

  <!-- children sitting on bench in front -->
  <!-- bench -->
  <rect x="80" y="460" width="350" height="12" rx="3" fill="#a07040"/>
  <rect x="100" y="472" width="10" height="30" fill="#8B5E3C"/>
  <rect x="400" y="472" width="10" height="30" fill="#8B5E3C"/>

  <!-- child 1 - dark skin, blue shirt -->
  <g transform="translate(130 445)">
    <circle cx="0" cy="-18" r="14" fill="#6d4a2a"/>
    <path d="M-14 -22 Q0 -36 14 -22" fill="#2d1a0a"/>
    <rect x="-12" y="-4" width="24" height="22" rx="4" fill="#5B9BD5"/>
    <circle cx="-5" cy="-20" r="1.5" fill="#f5f0e6"/>
    <circle cx="5" cy="-20" r="1.5" fill="#f5f0e6"/>
    <path d="M-3 -14 Q0 -12 3 -14" stroke="#f5f0e6" stroke-width="1" fill="none"/>
    <!-- raised hand -->
    <path d="M14 -4 L22 -18 L26 -16 L18 -2Z" fill="#6d4a2a"/>
    <circle cx="24" cy="-20" r="4" fill="#6d4a2a"/>
  </g>

  <!-- child 2 - medium skin, coral shirt -->
  <g transform="translate(220 448)">
    <circle cx="0" cy="-18" r="13" fill="#c8905d"/>
    <path d="M-10 -28 Q0 -34 10 -28 L12 -18 Q0 -16 -12 -18Z" fill="#5a3520"/>
    <rect x="-11" y="-5" width="22" height="20" rx="4" fill="#E87461"/>
    <circle cx="-4" cy="-20" r="1.5" fill="#3d2415"/>
    <circle cx="4" cy="-20" r="1.5" fill="#3d2415"/>
    <path d="M-3 -14 Q0 -11 3 -14" stroke="#3d2415" stroke-width="1" fill="none"/>
  </g>

  <!-- child 3 - light skin, green shirt -->
  <g transform="translate(310 445)">
    <circle cx="0" cy="-18" r="14" fill="#e0b090"/>
    <path d="M-12 -26 Q0 -36 12 -26" fill="#D4A54A"/>
    <rect x="-12" y="-4" width="24" height="22" rx="4" fill="#4A7C59"/>
    <circle cx="-5" cy="-20" r="1.5" fill="#3d2415"/>
    <circle cx="5" cy="-20" r="1.5" fill="#3d2415"/>
    <path d="M-3 -14 Q0 -12 3 -14" stroke="#3d2415" stroke-width="1" fill="none"/>
    <!-- raised hand -->
    <path d="M-14 -4 L-24 -15 L-28 -13 L-18 -2Z" fill="#e0b090"/>
    <circle cx="-26" cy="-17" r="4" fill="#e0b090"/>
  </g>

  <!-- child 4 - dark skin, yellow shirt -->
  <g transform="translate(400 448)">
    <circle cx="0" cy="-18" r="12" fill="#8B5E3C"/>
    <path d="M-10 -24 Q0 -32 10 -24" fill="#2d1a0a"/>
    <rect x="-10" y="-6" width="20" height="18" rx="3" fill="#E8C94A"/>
    <circle cx="-4" cy="-20" r="1.5" fill="#f5f0e6"/>
    <circle cx="4" cy="-20" r="1.5" fill="#f5f0e6"/>
    <path d="M-2 -14 Q0 -12 2 -14" stroke="#f5f0e6" stroke-width="1" fill="none"/>
  </g>
</svg>

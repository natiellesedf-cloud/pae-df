<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520">
  <defs>
    <linearGradient id="bg-nutri" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#fdf6e8"/>
      <stop offset="1" stop-color="#faf0dc"/>
    </linearGradient>
  </defs>
  <rect width="800" height="520" fill="url(#bg-nutri)"/>
  <!-- kitchen counter -->
  <rect x="50" y="300" width="700" height="180" rx="4" fill="#c8905d"/>
  <rect x="50" y="296" width="700" height="10" rx="3" fill="#a07040"/>
  <!-- blackboard -->
  <rect x="480" y="60" width="250" height="180" rx="8" fill="#2F3D1E"/>
  <rect x="490" y="70" width="230" height="160" rx="4" fill="#3d5a2e"/>
  <text x="530" y="110" font-family="Inter,sans-serif" font-size="11" fill="#eef7f0" font-weight="600">GRUPOS ALIMENTARES</text>
  <circle cx="520" cy="140" r="10" fill="#4A7C59"/>
  <text x="535" y="144" font-family="Inter,sans-serif" font-size="9" fill="#eef7f0">In natura</text>
  <circle cx="520" cy="168" r="10" fill="#D4A54A"/>
  <text x="535" y="172" font-family="Inter,sans-serif" font-size="9" fill="#eef7f0">Processados</text>
  <circle cx="520" cy="196" r="10" fill="#E87461"/>
  <text x="535" y="200" font-family="Inter,sans-serif" font-size="9" fill="#eef7f0">Ultraprocessados</text>
  <!-- nutritionist -->
  <g transform="translate(380 280)">
    <circle cx="0" cy="-80" r="22" fill="#6d4a2a"/>
    <rect x="-18" y="-58" width="36" height="50" rx="4" fill="white"/>
    <rect x="-16" y="-56" width="32" height="46" rx="3" fill="#f5f0e6"/>
    <path d="M-6 -50 L6 -50 L4 -38 L-4 -38Z" fill="#4A7C59"/>
    <rect x="-10" y="-8" width="8" height="30" rx="3" fill="#3d2415"/>
    <rect x="2" y="-8" width="8" height="30" rx="3" fill="#3d2415"/>
    <!-- pointing arm -->
    <path d="M18 -45 L50 -60 L52 -56 L20 -42Z" fill="#6d4a2a"/>
  </g>
  <!-- fruits on counter -->
  <g>
    <circle cx="120" cy="285" r="15" fill="#e44"/>
    <circle cx="155" cy="288" r="12" fill="#f90"/>
    <circle cx="185" cy="286" r="14" fill="#E8C94A"/>
    <ellipse cx="220" cy="288" rx="16" ry="12" fill="#4A7C59"/>
    <circle cx="260" cy="287" r="13" fill="#E87461"/>
  </g>
  <!-- pots -->
  <g>
    <rect x="80" y="350" width="50" height="40" rx="4" fill="#a0a0a0"/>
    <rect x="75" y="345" width="60" height="8" rx="3" fill="#888"/>
    <ellipse cx="105" cy="345" rx="6" ry="10" fill="#888"/>
    <rect x="180" y="360" width="40" height="30" rx="4" fill="#d4a54a"/>
    <rect x="176" y="356" width="48" height="6" rx="3" fill="#c09030"/>
  </g>
  <!-- children sitting -->
  <g transform="translate(100 220)">
    <circle cx="0" cy="0" r="12" fill="#c8905d"/>
    <rect x="-10" y="12" width="20" height="22" rx="3" fill="#5B9BD5"/>
    <circle cx="55" cy="3" r="11" fill="#8B5E3C"/>
    <rect x="45" y="14" width="20" height="20" rx="3" fill="#E87461"/>
    <circle cx="110" cy="0" r="12" fill="#e0b090"/>
    <rect x="100" y="12" width="20" height="22" rx="3" fill="#4A7C59"/>
  </g>
</svg>